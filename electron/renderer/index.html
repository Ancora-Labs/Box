<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATLAS Desktop Workspace</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: rgba(10, 10, 10, 0.96);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f4f4f4;
      --muted: #b8b8b8;
      --accent: #4dd68a;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI Variable Display", "Segoe UI", Inter, sans-serif;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 18%),
        linear-gradient(180deg, #030303 0%, var(--bg) 38%, #0a0a0a 100%);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .workspace-loader {
      width: min(520px, 100%);
      display: grid;
      gap: 18px;
      padding: 24px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(20, 20, 20, 0.96), rgba(11, 11, 11, 0.98));
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    p,
    code,
    strong {
      margin: 0;
    }

    h1 {
      font-size: clamp(30px, 5vw, 42px);
      letter-spacing: -0.05em;
      line-height: 1.02;
    }

    p,
    code {
      color: var(--muted);
      line-height: 1.6;
      word-break: break-word;
    }

    code {
      display: block;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      font-family: "Cascadia Code", Consolas, monospace;
    }

    .status-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .status-light {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      animation: atlas-loader-pulse 1.8s ease-in-out infinite;
    }

    .error {
      min-height: 1.4em;
      color: var(--danger);
    }

    @keyframes atlas-loader-pulse {
      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(77, 214, 138, 0.12);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(77, 214, 138, 0.04);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="workspace-loader" aria-label="ATLAS desktop workspace">
      <div class="eyebrow">ATLAS Desktop</div>
      <h1>Opening the workspace.</h1>
      <div class="status-row" aria-live="polite" aria-atomic="true">
        <span class="status-light" aria-hidden="true"></span>
        <strong data-role="status">Reading the desktop bootstrap...</strong>
      </div>
      <p data-role="detail">ATLAS keeps the native window on the same desktop surface while it restores the current workspace route.</p>
      <code data-role="workspace-url">Resolving workspace route...</code>
      <p class="error" data-role="error"></p>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
