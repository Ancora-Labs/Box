services:
  box:
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    # npm ci ensures deps match package-lock.json exactly; --omit=dev skips
    # devDependencies that are not needed at runtime in the container.
    command: ["sh", "-c", "npm ci --omit=dev && npm run box:start"]
    restart: unless-stopped
